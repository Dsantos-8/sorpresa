<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ti ❤️</title>
<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ffdde1,#ee9ca7);
  text-align:center;
}
h1{color:#b30059; margin-top:20px;}

/* Secciones */
.section{
  display:none;
  width:100%;
  height:100vh;
  padding:20px;
  box-sizing:border-box;
}

/* Vídeo */
#videoSection{
  display:block;
  background:black;
  position:relative;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

/* Pregunta */
#questionSection p{
  font-size:1.5em;
  margin-top:50px;
}

/* Botones */
button{
  padding:15px 25px;
  font-size:18px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  margin:10px;
}

#yesBtn{background-color:#ff4d88; color:white;}
#noBtn{background-color:#ccc; position:relative;}

/* Subpágina historia */
#storySection img{
  max-width:90%;
  margin-top:20px;
  border-radius:14px;
}
</style>
</head>

<body>

<!-- SECCIÓN 1: VÍDEO -->
<div id="videoSection" class="section">
  <iframe id="video"
    src="https://www.youtube.com/embed/yf3KIZavpXk?playsinline=1&mute=1"
    allow="autoplay; encrypted-media"
    allowfullscreen>
  </iframe>
</div>

<!-- SECCIÓN 2: PREGUNTA -->
<div id="questionSection" class="section">
  <p>Si has llegado hasta aquí es porque eres muy importante para mí…<br>
  ¿Quieres seguir escribiendo esta historia conmigo?</p>
  <button id="yesBtn">Sí ❤️</button>
  <button id="noBtn">No 😅</button>
</div>

<!-- SECCIÓN 3: HISTORIA -->
<div id="storySection" class="section">
  <p>Aquí empieza nuestra historia... ❤️</p>
  <img src="https://via.placeholder.com/400x300.png?text=Tu+sorpresa" alt="Sorpresa">
  <br>
  <button id="storyWhatsAppBtn">Sigamos escribiendo esta historia... con nuestras reglas</button>
</div>

<script>
const videoSection = document.getElementById("videoSection");
const questionSection = document.getElementById("questionSection");
const storySection = document.getElementById("storySection");

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const storyWhatsAppBtn = document.getElementById("storyWhatsAppBtn");
const iframe = document.getElementById("video");

// REPRODUCIR VIDEO AUTOMÁTICAMENTE A LOS 3 SEGUNDOS
setTimeout(()=>{
  iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
}, 3000);

// DETECTAR FIN DE VIDEO (API de YouTube)
function onYouTubeIframeAPIReady() {
  var player = new YT.Player('video', {
    events: {
      'onStateChange': onPlayerStateChange
    }
  });
}

function onPlayerStateChange(event) {
  // Cuando termina (estado 0)
  if(event.data === 0){
    videoSection.style.display="none";
    questionSection.style.display="block";
  }
}

// Botón NO se mueve
function moverBoton(){
  const x=Math.random()*200-100;
  const y=Math.random()*200-100;
  noBtn.style.transform=`translate(${x}px,${y}px)`;
}
noBtn.addEventListener("mouseover", moverBoton);
noBtn.addEventListener("touchstart", moverBoton);

// Botón SÍ → Mostrar historia
yesBtn.onclick = ()=>{
  questionSection.style.display="none";
  storySection.style.display="block";
};

// Botón historia → WhatsApp prellenado
storyWhatsAppBtn.onclick = ()=>{
  const mensaje = encodeURIComponent("TU MENSAJE COMPLETO AQUÍ");
  window.location.href = "https://wa.me/34600520811?text="+mensaje;
};

// CARGAR API DE YOUTUBE
var tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.body.appendChild(tag);
</script>

</body>
</html>
