<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ti ❤️</title>
<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ffdde1,#ee9ca7);
  text-align:center;
}
h1{color:#b30059; margin-top:20px;}

/* Secciones */
.section{
  display:none;
  width:100%;
  height:100vh;
  padding:20px;
  box-sizing:border-box;
}

/* VIDEO */
#videoSection{
  display:block;
  background:black;
  position:relative;
}
#playOverlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:3em;
  color:white;
  background: rgba(0,0,0,0.5);
  border-radius:50%;
  padding:20px;
  cursor:pointer;
  z-index:10;
}
iframe{
  width:100%;
  height:100%;
  border:none;
}

/* Pregunta */
#questionSection p{
  font-size:1.5em;
  margin-top:50px;
}
button{
  padding:15px 25px;
  font-size:18px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  margin:10px;
}
#yesBtn{background-color:#ff4d88; color:white;}
#noBtn{background-color:#ccc; position:relative;}

/* Historia */
#storySection img{
  max-width:90%;
  margin-top:20px;
  border-radius:14px;
}
</style>
</head>
<body>

<!-- SECCIÓN 1: VIDEO -->
<div id="videoSection" class="section">
  <iframe id="video"
    src="https://www.youtube.com/embed/yf3KIZavpXk?enablejsapi=1&playsinline=1&mute=1"
    allow="autoplay; encrypted-media"
    allowfullscreen>
  </iframe>
  <div id="playOverlay">▶️</div>
</div>

<!-- SECCIÓN 2: PREGUNTA -->
<div id="questionSection" class="section">
  <p>Si has llegado hasta aquí es porque eres muy importante para mí…<br>
  ¿Quieres seguir escribiendo esta historia conmigo?</p>
  <button id="yesBtn">Sí ❤️</button>
  <button id="noBtn">No 😅</button>
</div>

<!-- SECCIÓN 3: HISTORIA -->
<div id="storySection" class="section">
  <p>Aquí empieza nuestra historia... ❤️</p>
  <img src="https://via.placeholder.com/400x300.png?text=Tu+sorpresa" alt="Sorpresa">
  <br>
  <button id="storyWhatsAppBtn">Sigamos escribiendo esta historia... con nuestras reglas</button>
</div>

<script>
let videoSection = document.getElementById("videoSection");
let questionSection = document.getElementById("questionSection");
let storySection = document.getElementById("storySection");

let yesBtn = document.getElementById("yesBtn");
let noBtn = document.getElementById("noBtn");
let storyWhatsAppBtn = document.getElementById("storyWhatsAppBtn");
let playOverlay = document.getElementById("playOverlay");

let player;

// FUNCION DE BOTON PLAY
playOverlay.onclick = function(){
  // Oculta overlay
  playOverlay.style.display="none";

  // Inicia video
  player.playVideo();
}

// BOTON NO SE MUEVE
function moverBoton(){
  const x=Math.random()*200-100;
  const y=Math.random()*200-100;
  noBtn.style.transform=`translate(${x}px,${y}px)`;
}
noBtn.addEventListener("mouseover", moverBoton);
noBtn.addEventListener("touchstart", moverBoton);

// BOTON SI → HISTORIA
yesBtn.onclick = ()=>{
  questionSection.style.display="none";
  storySection.style.display="block";
};

// BOTON HISTORIA → WhatsApp
storyWhatsAppBtn.onclick = ()=>{
  const mensaje = encodeURIComponent("TU MENSAJE COMPLETO AQUÍ");
  window.location.href = "https://wa.me/34666249985?text="+mensaje;
};

// CARGAR API DE YOUTUBE
var tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.body.appendChild(tag);

// Crear player de YouTube
function onYouTubeIframeAPIReady() {
  player = new YT.Player('video', {
    events: {
      'onStateChange': onPlayerStateChange
    }
  });
}

// DETECTAR FIN DEL VIDEO
function onPlayerStateChange(event) {
  // Estado 0 = terminó
  if(event.data === 0){
    videoSection.style.display="none";
    questionSection.style.display="block";
  }
}
</script>

</body>
</html>
