<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti ❤️</title>

<style>

body{
margin:0;
font-family:Helvetica,Arial,sans-serif;
background:black;
color:white;
text-align:center;
overflow:hidden;
}

.section{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
transition:opacity 1.5s;
}

.hidden{
opacity:0;
pointer-events:none;
}

img{
max-width:100%;
max-height:100%;
object-fit:cover;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

button{
padding:15px 30px;
font-size:20px;
margin:15px;
border:none;
border-radius:30px;
cursor:pointer;
transition:transform 0.3s;
}

.yes{
background:#ff2d55;
color:white;
}

.no{
background:#444;
color:white;
}

.fadeText{
opacity:0;
transition:opacity 2s;
}

</style>
</head>

<body>

<!-- FOTO INICIAL -->

<div id="intro" class="section">

<img src="foto.jpg">

</div>


<!-- VIDEO -->

<div id="videoSection" class="section hidden">

<video id="video" playsinline controls>

<source src="VIDEO_DROPBOX_AQUI" type="video/mp4">

</video>

</div>


<!-- PREGUNTA -->

<div id="question" class="section hidden">

<h1 id="questionText" class="fadeText">

AQUÍ VA LA PREGUNTA

</h1>

<div>

<button class="yes" onclick="yes()">Sí</button>

<button class="no">No</button>

</div>

</div>


<!-- FINAL -->

<div id="final" class="section hidden">

<h1>

AQUÍ VA EL TEXTO FINAL

</h1>

<img src="foto_final.jpg" style="max-width:70%;margin-top:20px;">

<br><br>

<button class="yes" onclick="whatsapp()">

Sigamos escribiendo esta historia... con nuestras reglas

</button>

</div>


<script>


// FOTO → VIDEO

setTimeout(()=>{

document.getElementById("intro").classList.add("hidden")

document.getElementById("videoSection").classList.remove("hidden")

},5000)


// PLAY VIDEO AL TOCAR

let video=document.getElementById("video")

document.getElementById("videoSection").addEventListener("click",()=>{

video.play()

})


// CUANDO ACABA EL VIDEO

video.onended=()=>{

setTimeout(()=>{

document.getElementById("videoSection").classList.add("hidden")

document.getElementById("question").classList.remove("hidden")

document.getElementById("questionText").style.opacity=1

vibrate()

},3000)

}


// VIBRACIÓN (IPHONE)

function vibrate(){

if(navigator.vibrate){

navigator.vibrate([200,100,200])

}

}


// BOTÓN SI

function yes(){

document.getElementById("question").classList.add("hidden")

document.getElementById("final").classList.remove("hidden")

vibrate()

}


// WHATSAPP

function whatsapp(){

window.location.href="https://wa.me/34666249985?text=MENSAJE_AQUI"

}


// BOTÓN NO QUE SE MUEVE

let noBtn=document.querySelector(".no")

noBtn.addEventListener("click",()=>{

let x=Math.random()*200-100
let y=Math.random()*200-100

noBtn.style.transform=`translate(${x}px,${y}px)`

vibrate()

})


</script>

</body>
</html>
