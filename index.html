<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ti ❤️</title>

<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ffdde1,#ee9ca7);
  text-align:center;
  padding:20px;
}

h1{
  color:#b30059;
}

#videoContainer{
  display:none;
  margin-top:20px;
  max-width:420px;
  margin-left:auto;
  margin-right:auto;
}

iframe{
  width:100%;
  aspect-ratio:9/16;
  border-radius:14px;
  border:none;
}

#question{
  display:none;
  margin-top:30px;
}

button{
  padding:15px 25px;
  font-size:18px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  margin:10px;
}

#yesBtn{
  background-color:#ff4d88;
  color:white;
}

#noBtn{
  background-color:#ccc;
  position:relative;
}
</style>
</head>

<body>

<h1>💖 Tengo algo para ti 💖</h1>

<button id="playBtn">▶️ Reproducir</button>

<div id="videoContainer">
  <iframe
    id="video"
    src="https://www.youtube.com/embed/yf3KIZavpXk?playsinline=1"
    allow="autoplay; encrypted-media"
    allowfullscreen>
  </iframe>
</div>

<div id="question">
  <p>
  Si has llegado hasta aquí es porque eres muy importante para mí…<br>
  ¿Quieres seguir escribiendo esta historia conmigo?
  </p>

  <button id="yesBtn">Sí ❤️</button>
  <button id="noBtn">No 😅</button>
</div>

<script>
const playBtn = document.getElementById("playBtn");
const videoContainer = document.getElementById("videoContainer");
const question = document.getElementById("question");
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");

let videoStarted=false;

// ▶️ Mostrar y reproducir vídeo (compatible iPhone)
playBtn.onclick=()=>{
  playBtn.style.display="none";
  videoContainer.style.display="block";

  const iframe=document.getElementById("video");

  if(!videoStarted){
    iframe.src+="&autoplay=1";
    videoStarted=true;
  }

  // Mostrar pregunta tras unos segundos (temporal)
  setTimeout(()=>{
    question.style.display="block";
  },15000);
};

// Botón NO se mueve 😅
function moverBoton(){
  const x=Math.random()*200-100;
  const y=Math.random()*200-100;
  noBtn.style.transform=`translate(${x}px,${y}px)`;
}

noBtn.addEventListener("touchstart",moverBoton);
noBtn.addEventListener("mouseover",moverBoton);

// Botón SÍ → WhatsApp
yesBtn.onclick=()=>{
  const mensaje=encodeURIComponent(
    "❤️ He dicho que SÍ ❤️\n\nPulsa enviar 😊"
  );

  window.location.href=
    "https://wa.me/34666249985?text="+mensaje;
};
</script>

</body>
</html>
